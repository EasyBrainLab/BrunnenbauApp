services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - traefik-proxy
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.brunnenbau.rule=Host(`bbtemp.easybrainlab.com`)"
      - "traefik.http.routers.brunnenbau.entrypoints=websecure"
      - "traefik.http.routers.brunnenbau.tls.certresolver=cloudflare"
      - "traefik.http.services.brunnenbau.loadbalancer.server.port=80"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "3001"
    env_file:
      - .env
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads
    restart: unless-stopped

networks:
  traefik-proxy:
    external: true

volumes:
  backend_data:
  backend_uploads:
