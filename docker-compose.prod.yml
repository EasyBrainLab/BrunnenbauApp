services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-brunnenbau}
      POSTGRES_USER: ${POSTGRES_USER:-brunnenbau}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-brunnenbau} -d ${POSTGRES_DB:-brunnenbau}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - traefik-proxy
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.brunnenbau.rule=Host(`${PUBLIC_DOMAIN}`)"
      - "traefik.http.routers.brunnenbau.entrypoints=websecure"
      - "traefik.http.routers.brunnenbau.tls.certresolver=${TRAEFIK_CERTRESOLVER:-cloudflare}"
      - "traefik.http.services.brunnenbau.loadbalancer.server.port=80"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "3001"
    env_file:
      - .env
    environment:
      DB_CLIENT: ${DB_CLIENT:-postgres}
      DATABASE_URL: ${DATABASE_URL:-postgresql://brunnenbau:${POSTGRES_PASSWORD}@postgres:5432/brunnenbau}
      POSTGRES_DB: ${POSTGRES_DB:-brunnenbau}
      POSTGRES_USER: ${POSTGRES_USER:-brunnenbau}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

networks:
  traefik-proxy:
    external: true

volumes:
  backend_data:
  backend_uploads:
  postgres_data:
